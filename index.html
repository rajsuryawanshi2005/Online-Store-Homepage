<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BuyNest Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2 class="logo">BuyNest Store</h2>
  <input type="text" id="search" placeholder="Search products...">

  <div class="cart">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<nav>
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Electronics')">Electronics</button>
  <button onclick="filterCategory('Fashion')">Fashion</button>
  <button onclick="filterCategory('Books')">Books</button>
</nav>

<div class="filters">
  <select id="priceSort" onchange="sortProducts()">
    <option value="">Sort by Price</option>
    <option value="low">Low to High</option>
    <option value="high">High to Low</option>
  </select>

  <select id="ratingFilter" onchange="filterRating()">
    <option value="">Filter by Rating</option>
    <option value="4">4★ & above</option>
    <option value="3">3★ & above</option>
  </select>
</div>

<section id="products"></section>

<script src="script.js"></script>

</body>
</html>
